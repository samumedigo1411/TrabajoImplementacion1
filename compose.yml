services:
  postgres:
    image: postgres:16
    container_name: postgres_implementacion1
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: implementacion1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d implementacion1"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: postgres
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/implementacion1
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Trabajo1Implementacion_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/implementacion1
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KEYCLOAK_URL: http://keycloak:8080
      SERVER_PORT: 8080
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge